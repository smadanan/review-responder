<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Review Responder — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      font-family: Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1.5rem;
      padding: 2.5rem;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 0.75rem;
      color: #a5b4fc;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1rem;
      font-family: sans-serif;
    }
    h1 {
      font-size: 1.8rem;
      color: #f8fafc;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #94a3b8;
      font-size: 0.9rem;
      margin-bottom: 2rem;
      font-family: sans-serif;
    }
    label {
      display: block;
      color: #94a3b8;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 6px;
      font-family: sans-serif;
      text-align: left;
    }
    input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.6rem;
      color: #f1f5f9;
      font-size: 1rem;
      font-family: Georgia, serif;
      margin-bottom: 1.25rem;
      transition: border 0.15s;
    }
    input:focus { outline: none; border-color: rgba(99,102,241,0.6); }
    input::placeholder { color: #475569; }
    .login-btn {
      width: 100%;
      padding: 0.85rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(99,102,241,0.4);
      font-family: sans-serif;
      transition: opacity 0.2s;
    }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error {
      color: #fca5a5;
      font-size: 0.82rem;
      padding: 10px 14px;
      background: rgba(239,68,68,0.1);
      border-radius: 8px;
      margin-bottom: 1rem;
      font-family: sans-serif;
      display: none;
      text-align: left;
    }
    .footer {
      color: #334155;
      font-size: 0.75rem;
      margin-top: 1.5rem;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">✦ AI-Powered</div>
    <h1>Review Responder</h1>
    <p class="subtitle">Enter your access password to continue</p>
    <div class="error" id="errorBox"></div>
    <label>Access Password</label>
    <input type="password" id="passwordInput" placeholder="Enter your password" />
    <button class="login-btn" id="loginBtn" onclick="login()">
      Enter →
    </button>
    <p class="footer">Don't have access? Contact your service provider.</p>
  </div>
  <script>
    // Check if already logged in
    if (sessionStorage.getItem("rrPassword")) {
      window.location.href = "/app";
    }

    async function login() {
      const password = document.getElementById("passwordInput").value.trim();
      const errorBox = document.getElementById("errorBox");
      const btn = document.getElementById("loginBtn");

      errorBox.style.display = "none";

      if (!password) {
        errorBox.textContent = "Please enter your password.";
        errorBox.style.display = "block";
        return;
      }

      btn.disabled = true;
      btn.textContent = "Checking...";

      try {
        const res = await fetch("/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password })
        });
        const data = await res.json();

        if (data.success) {
          sessionStorage.setItem("rrPassword", password);
          window.location.href = "/app";
        } else {
          errorBox.textContent = data.error || "Invalid password.";
          errorBox.style.display = "block";
        }
      } catch (e) {
        errorBox.textContent = "Network error. Please try again.";
        errorBox.style.display = "block";
      }

      btn.disabled = false;
      btn.textContent = "Enter →";
    }

    document.getElementById("passwordInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
