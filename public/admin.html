<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Review Responder — Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      font-family: sans-serif;
      padding: 2rem 1rem;
      color: #f1f5f9;
    }
    .container { max-width: 700px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 2rem; }
    .badge {
      display: inline-block;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 0.75rem;
      color: #a5b4fc;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    h1 { font-size: 1.8rem; color: #f8fafc; margin-bottom: 0.5rem; }
    .subtitle { color: #94a3b8; font-size: 0.9rem; }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1.25rem;
      padding: 1.75rem;
      margin-bottom: 1.5rem;
    }
    .card h2 { color: #a5b4fc; font-size: 1rem; margin-bottom: 1.25rem; text-transform: uppercase; letter-spacing: 0.08em; }
    label { display: block; color: #94a3b8; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    input {
      width: 100%; padding: 0.65rem 0.85rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.6rem; color: #f1f5f9;
      font-size: 0.93rem; margin-bottom: 1rem;
    }
    input:focus { outline: none; border-color: rgba(99,102,241,0.6); }
    input::placeholder { color: #475569; }
    .btn {
      padding: 0.7rem 1.5rem;
      border: none; border-radius: 0.6rem;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      box-shadow: 0 4px 15px rgba(99,102,241,0.3);
    }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm { padding: 5px 12px; font-size: 0.78rem; border-radius: 6px; border: none; cursor: pointer; font-weight: 600; }
    .btn-deactivate { background: rgba(239,68,68,0.15); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
    .btn-activate { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
    .btn-reset { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
    .btn-save { background: rgba(99,102,241,0.2); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.3); }
    .btn-cancel { background: rgba(255,255,255,0.05); color: #64748b; border: 1px solid rgba(255,255,255,0.1); }
    .error { color: #fca5a5; font-size: 0.82rem; padding: 10px 14px; background: rgba(239,68,68,0.1); border-radius: 8px; margin-bottom: 1rem; display: none; }
    .success { color: #6ee7b7; font-size: 0.82rem; padding: 10px 14px; background: rgba(16,185,129,0.1); border-radius: 8px; margin-bottom: 1rem; display: none; }
    .client-row {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 0.75rem;
      margin-bottom: 0.75rem;
      overflow: hidden;
    }
    .client-main {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.25rem;
      gap: 1rem;
    }
    .client-info { flex: 1; }
    .client-name { color: #f1f5f9; font-size: 0.95rem; font-weight: 600; margin-bottom: 4px; }
    .client-password { color: #64748b; font-size: 0.8rem; font-family: monospace; }
    .client-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .status {
      display: flex; align-items: center; gap: 6px;
      font-size: 0.8rem; font-weight: 600;
      padding: 4px 10px; border-radius: 999px;
      white-space: nowrap;
    }
    .status-active { background: rgba(16,185,129,0.1); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.2); }
    .status-inactive { background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
    .reset-panel {
      display: none;
      padding: 1rem 1.25rem;
      border-top: 1px solid rgba(255,255,255,0.07);
      background: rgba(245,158,11,0.04);
    }
    .reset-panel label { color: #fcd34d; }
    .reset-row { display: flex; gap: 8px; align-items: center; }
    .reset-row input { margin-bottom: 0; flex: 1; }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    #loginView { display: flex; align-items: center; justify-content: center; min-height: 80vh; }
    #adminView { display: none; }
    .login-card {
      width: 100%; max-width: 400px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1.5rem; padding: 2.5rem;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
      text-align: center;
    }
    .empty { color: #475569; text-align: center; padding: 2rem; font-size: 0.9rem; }
    .loading { color: #64748b; text-align: center; padding: 1rem; font-size: 0.85rem; }
  </style>
</head>
<body>

<div id="loginView">
  <div class="login-card">
    <div class="badge">⚙ Admin Panel</div>
    <h1 style="margin-bottom:0.5rem">Admin Login</h1>
    <p class="subtitle" style="margin-bottom:2rem">Review Responder Management</p>
    <div class="error" id="loginError"></div>
    <label>Admin Password</label>
    <input type="password" id="adminPasswordInput" placeholder="Enter admin password" />
    <button class="btn btn-primary" style="width:100%" onclick="adminLogin()">Login →</button>
  </div>
</div>

<div id="adminView">
  <div class="container">
    <div class="header">
      <div class="badge">⚙ Admin Panel</div>
      <h1>Client Manager</h1>
      <p class="subtitle">Manage access for all your paying clients</p>
    </div>
    <div class="card">
      <h2>➕ Add New Client</h2>
      <div class="error" id="addError"></div>
      <div class="success" id="addSuccess"></div>
      <div class="row-2">
        <div>
          <label>Client / Business Name</label>
          <input id="newClientName" type="text" placeholder="e.g. Spice Garden" />
        </div>
        <div>
          <label>Their Password</label>
          <input id="newClientPassword" type="text" placeholder="e.g. spicegarden2024" />
        </div>
      </div>
      <button class="btn btn-primary" id="addBtn" onclick="addClient()">Add Client</button>
    </div>
    <div class="card">
      <h2>👥 All Clients</h2>
      <div class="success" id="globalSuccess"></div>
      <div class="error" id="globalError"></div>
      <div id="clientList"><div class="loading">Loading clients...</div></div>
    </div>
    <div style="text-align:center; margin-top:1rem">
      <button class="btn" style="background:rgba(255,255,255,0.05);color:#64748b" onclick="adminLogout()">Logout</button>
    </div>
  </div>
</div>

<script>
  let adminPassword = "";

  async function adminLogin() {
    const pwd = document.getElementById("adminPasswordInput").value.trim();
    const errorBox = document.getElementById("loginError");
    errorBox.style.display = "none";
    if (!pwd) { errorBox.textContent = "Please enter admin password."; errorBox.style.display = "block"; return; }
    const res = await fetch("/admin/verify", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pwd })
    });
    const data = await res.json();
    if (data.success) {
      adminPassword = pwd;
      document.getElementById("loginView").style.display = "none";
      document.getElementById("adminView").style.display = "block";
      loadClients();
    } else {
      errorBox.textContent = data.error || "Invalid password.";
      errorBox.style.display = "block";
    }
  }

  async function loadClients() {
    const list = document.getElementById("clientList");
    list.innerHTML = '<div class="loading">Loading...</div>';
    const res = await fetch("/admin/clients", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ adminPassword })
    });
    const data = await res.json();
    if (!data.clients || data.clients.length === 0) {
      list.innerHTML = '<div class="empty">No clients yet. Add your first one above.</div>';
      return;
    }
    list.innerHTML = data.clients.map(client => `
      <div class="client-row" id="row-${client.id}">
        <div class="client-main">
          <div class="client-info">
            <div class="client-name">${client.client}</div>
            <div class="client-password">
              ${client.active
                ? `🔑 <strong style="color:#a5b4fc">${client.password}</strong>`
                : `🔒 Deactivated`
              }
            </div>
          </div>
          <div class="status ${client.active ? 'status-active' : 'status-inactive'}">
            ${client.active ? '✅ Active' : '⛔ Inactive'}
          </div>
          <div class="client-actions">
            <button
              class="btn-sm ${client.active ? 'btn-deactivate' : 'btn-activate'}"
              onclick="toggleClient(${client.id})"
              id="toggle-${client.id}">
              ${client.active ? 'Deactivate' : 'Reactivate'}
            </button>
            <button
              class="btn-sm btn-reset"
              onclick="toggleResetPanel(${client.id})"
              id="resetBtn-${client.id}">
              🔁 Reset Password
            </button>
          </div>
        </div>
        <div class="reset-panel" id="resetPanel-${client.id}">
          <label>New Password for ${client.client}</label>
          <div class="reset-row">
            <input
              type="text"
              id="resetInput-${client.id}"
              placeholder="Enter new password e.g. newpass2024"
            />
            <button class="btn-sm btn-save" onclick="resetPassword(${client.id})">Save</button>
            <button class="btn-sm btn-cancel" onclick="toggleResetPanel(${client.id})">Cancel</button>
          </div>
        </div>
      </div>
    `).join("");
  }

  function toggleResetPanel(id) {
    const panel = document.getElementById(`resetPanel-${id}`);
    const isVisible = panel.style.display === "block";
    document.querySelectorAll(".reset-panel").forEach(p => p.style.display = "none");
    document.querySelectorAll("[id^='resetBtn-']").forEach(b => b.textContent = "🔁 Reset Password");
    if (!isVisible) {
      panel.style.display = "block";
      document.getElementById(`resetBtn-${id}`).textContent = "✕ Cancel Reset";
      document.getElementById(`resetInput-${id}`).focus();
    }
  }

  async function resetPassword(id) {
    const newPassword = document.getElementById(`resetInput-${id}`).value.trim();
    const globalSuccess = document.getElementById("globalSuccess");
    const globalError = document.getElementById("globalError");
    globalSuccess.style.display = "none";
    globalError.style.display = "none";
    if (!newPassword) {
      globalError.textContent = "Please enter a new password.";
      globalError.style.display = "block";
      return;
    }
    const res = await fetch("/admin/reset", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ adminPassword, id, newPassword })
    });
    const data = await res.json();
    if (data.success) {
      globalSuccess.textContent = `✅ Password updated successfully!`;
      globalSuccess.style.display = "block";
      loadClients();
    } else {
      globalError.textContent = data.error || "Could not reset password.";
      globalError.style.display = "block";
    }
  }

  async function addClient() {
    const clientName = document.getElementById("newClientName").value.trim();
    const password = document.getElementById("newClientPassword").value.trim();
    const errorBox = document.getElementById("addError");
    const successBox = document.getElementById("addSuccess");
    const btn = document.getElementById("addBtn");
    errorBox.style.display = "none";
    successBox.style.display = "none";
    if (!clientName) { errorBox.textContent = "Please enter client name."; errorBox.style.display = "block"; return; }
    if (!password) { errorBox.textContent = "Please enter a password."; errorBox.style.display = "block"; return; }
    btn.disabled = true;
    btn.textContent = "Adding...";
    const res = await fetch("/admin/add", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ adminPassword, client: clientName, password })
    });
    const data = await res.json();
    if (data.success) {
      successBox.textContent = `✅ ${clientName} added successfully!`;
      successBox.style.display = "block";
      document.getElementById("newClientName").value = "";
      document.getElementById("newClientPassword").value = "";
      loadClients();
    } else {
      errorBox.textContent = data.error || "Could not add client.";
      errorBox.style.display = "block";
    }
    btn.disabled = false;
    btn.textContent = "Add Client";
  }

  async function toggleClient(id) {
    const btn = document.getElementById(`toggle-${id}`);
    btn.disabled = true;
    btn.textContent = "Updating...";
    const res = await fetch("/admin/toggle", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ adminPassword, id })
    });
    const data = await res.json();
    if (data.success) {
      loadClients();
    } else {
      btn.disabled = false;
      btn.textContent = "Error — retry";
    }
  }

  function adminLogout() {
    adminPassword = "";
    document.getElementById("loginView").style.display = "flex";
    document.getElementById("adminView").style.display = "none";
    document.getElementById("adminPasswordInput").value = "";
  }

  document.getElementById("adminPasswordInput").addEventListener("keypress", (e) => {
    if (e.key === "Enter") adminLogin();
  });
</script>
</body>
</html>
