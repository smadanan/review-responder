<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Review Responder — AI-Powered</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      font-family: Georgia, serif;
      padding: 2rem 1rem;
      display: flex; flex-direction: column; align-items: center;
      color: #f1f5f9;
    }

    /* ── User Bar ── */
    .user-bar {
      position: fixed; top: 1rem; right: 1rem;
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px; padding: 6px 14px 6px 8px;
      z-index: 100; backdrop-filter: blur(8px);
    }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(99,102,241,0.4); display: none; }
    .user-avatar-fallback {
      width: 28px; height: 28px; border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; color: #fff; font-family: sans-serif;
    }
    .user-name { font-family: sans-serif; font-size: 0.78rem; color: #94a3b8; max-width: 120px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .logout-btn { background: none; border: none; color: #475569; font-size: 0.72rem; cursor: pointer; font-family: sans-serif; transition: color 0.15s; }
    .logout-btn:hover { color: #fca5a5; }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 2rem; max-width: 560px; margin-top: 1rem; }
    .badge {
      display: inline-block; background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3); border-radius: 999px;
      padding: 5px 14px; font-size: 0.75rem; color: #a5b4fc;
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1rem; font-family: sans-serif;
    }
    h1 { font-size: clamp(1.8rem, 5vw, 2.4rem); color: #f8fafc; margin-bottom: 0.5rem; }
    .subtitle { color: #94a3b8; font-size: 1rem; }

    /* ── Places Panel ── */
    .places-panel {
      width: 100%; max-width: 580px;
      background: rgba(59,130,246,0.06);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 1.5rem; padding: 1.5rem;
      margin-bottom: 1.25rem;
    }
    .places-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1rem;
    }
    .places-title {
      display: flex; align-items: center; gap: 8px;
      font-family: sans-serif; font-size: 0.88rem; font-weight: 600; color: #93c5fd;
    }
    .places-title svg { width: 18px; height: 18px; flex-shrink: 0; }
    .places-toggle {
      background: none; border: 1px solid rgba(59,130,246,0.3);
      color: #60a5fa; border-radius: 8px; padding: 5px 12px;
      font-size: 0.78rem; cursor: pointer; font-family: sans-serif; transition: all 0.15s;
    }
    .places-toggle:hover { background: rgba(59,130,246,0.1); }

    .places-body { display: none; }
    .places-body.open { display: block; }

    /* Search Row */
    .search-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    .search-input {
      flex: 1; padding: 0.65rem 0.9rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(59,130,246,0.2);
      border-radius: 0.6rem; color: #f1f5f9;
      font-size: 0.9rem; font-family: sans-serif;
      transition: border 0.15s;
    }
    .search-input:focus { outline: none; border-color: rgba(59,130,246,0.5); }
    .search-input::placeholder { color: #475569; }
    .search-btn {
      padding: 0.65rem 1.1rem;
      background: rgba(59,130,246,0.2);
      border: 1px solid rgba(59,130,246,0.3);
      color: #93c5fd; border-radius: 0.6rem;
      font-size: 0.88rem; cursor: pointer; font-family: sans-serif;
      transition: all 0.15s; white-space: nowrap;
    }
    .search-btn:hover { background: rgba(59,130,246,0.3); }
    .search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Business Results */
    .business-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 1rem; }
    .business-item {
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 0.75rem; cursor: pointer; transition: all 0.15s;
    }
    .business-item:hover { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.3); }
    .business-item.selected { background: rgba(59,130,246,0.15); border-color: rgba(59,130,246,0.5); }
    .business-name { font-family: sans-serif; font-size: 0.88rem; font-weight: 600; color: #e2e8f0; margin-bottom: 3px; }
    .business-meta { display: flex; align-items: center; gap: 10px; }
    .business-address { font-family: sans-serif; font-size: 0.75rem; color: #64748b; flex: 1; }
    .business-rating { font-family: sans-serif; font-size: 0.75rem; color: #F59E0B; white-space: nowrap; }

    /* Reviews List */
    .reviews-section { margin-top: 0.5rem; }
    .reviews-heading { font-family: sans-serif; font-size: 0.75rem; color: #64748b; letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 0.5rem; }
    .reviews-list { display: flex; flex-direction: column; gap: 0.5rem; max-height: 300px; overflow-y: auto; }
    .reviews-list::-webkit-scrollbar { width: 4px; }
    .reviews-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
    .reviews-list::-webkit-scrollbar-thumb { background: rgba(59,130,246,0.3); border-radius: 4px; }

    .review-item {
      padding: 0.8rem 1rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 0.75rem; cursor: pointer; transition: all 0.15s;
    }
    .review-item:hover { background: rgba(99,102,241,0.1); border-color: rgba(99,102,241,0.3); }
    .review-item.selected { background: rgba(99,102,241,0.15); border-color: rgba(99,102,241,0.5); }
    .review-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .review-author { font-family: sans-serif; font-size: 0.82rem; font-weight: 600; color: #cbd5e1; }
    .review-stars { color: #F59E0B; font-size: 0.78rem; }
    .review-time { font-family: sans-serif; font-size: 0.7rem; color: #475569; margin-bottom: 4px; }
    .review-snippet { font-size: 0.82rem; color: #64748b; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .review-no-text { font-size: 0.78rem; color: #475569; font-style: italic; }
    .click-hint { font-family: sans-serif; font-size: 0.7rem; color: #3b82f6; margin-top: 4px; }

    .places-status { font-family: sans-serif; font-size: 0.8rem; color: #60a5fa; padding: 6px 0; text-align: center; }
    .places-error { font-family: sans-serif; font-size: 0.8rem; color: #fca5a5; padding: 6px 0; text-align: center; }
    .places-empty { font-family: sans-serif; font-size: 0.82rem; color: #475569; padding: 10px 0; text-align: center; }

    /* ── Main Card ── */
    .card {
      width: 100%; max-width: 580px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 1.5rem; padding: 2rem;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4);
    }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.25rem; }
    .field { margin-bottom: 1.25rem; }
    label { display: block; color: #94a3b8; font-size: 0.78rem; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px; font-family: sans-serif; }
    input, select, textarea {
      width: 100%; padding: 0.65rem 0.85rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 0.6rem; color: #f1f5f9;
      font-size: 0.93rem; font-family: Georgia, serif; transition: border 0.15s;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: rgba(99,102,241,0.6); }
    input::placeholder, textarea::placeholder { color: #475569; }
    select option { background: #1e1b4b; }
    textarea { resize: vertical; line-height: 1.6; }

    .stars { display: flex; gap: 4px; margin-top: 6px; align-items: center; }
    .star-btn { background: none; border: none; cursor: pointer; padding: 2px; font-size: 1.4rem; line-height: 1; transition: transform 0.1s; }
    .star-btn:hover { transform: scale(1.2); }
    .star-label { color: #94a3b8; font-size: 0.8rem; margin-left: 8px; font-family: sans-serif; }

    .tones { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 6px; }
    .tone-btn {
      padding: 6px 14px; border-radius: 999px; font-size: 0.82rem;
      cursor: pointer; border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.04); color: #94a3b8;
      transition: all 0.15s; font-family: sans-serif;
    }
    .tone-btn.active { border-color: #818cf8; background: rgba(99,102,241,0.25); color: #c7d2fe; }

    .error { color: #fca5a5; font-size: 0.82rem; padding: 10px 14px; background: rgba(239,68,68,0.1); border-radius: 8px; margin-bottom: 1rem; font-family: sans-serif; display: none; }
    .generate-btn {
      width: 100%; padding: 0.85rem;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff; border: none; border-radius: 0.75rem;
      font-size: 1rem; font-weight: 600; cursor: pointer;
      box-shadow: 0 4px 20px rgba(99,102,241,0.4);
      transition: opacity 0.2s; font-family: sans-serif;
    }
    .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }

    /* ── Result ── */
    .result-card {
      width: 100%; max-width: 580px; margin-top: 1.5rem;
      background: rgba(16,185,129,0.06);
      border: 1px solid rgba(16,185,129,0.25);
      border-radius: 1.5rem; padding: 1.75rem; display: none;
      animation: fadeIn 0.4s ease;
    }
    .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .result-label { color: #6ee7b7; font-size: 0.8rem; text-transform: uppercase; font-weight: 600; letter-spacing: 0.08em; font-family: sans-serif; }
    .copy-btn { padding: 6px 12px; border-radius: 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; font-family: sans-serif; }
    .copy-btn.copied { background: rgba(16,185,129,0.2); color: #6ee7b7; }
    #responseText { color: #e2e8f0; line-height: 1.8; font-size: 0.97rem; white-space: pre-wrap; }
    .result-footer { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.06); }
    .regen-btn { background: none; border: 1px solid rgba(255,255,255,0.1); color: #94a3b8; padding: 6px 14px; border-radius: 8px; font-size: 0.82rem; cursor: pointer; font-family: sans-serif; }

    .footer { color: #334155; font-size: 0.75rem; margin-top: 2rem; font-family: sans-serif; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <!-- User Bar -->
  <div class="user-bar" id="userBar" style="display:none;">
    <div class="user-avatar-fallback" id="avatarFallback"></div>
    <img class="user-avatar" id="avatarImg" alt="avatar" />
    <span class="user-name" id="userName"></span>
    <button class="logout-btn" onclick="logout()" title="Sign out">✕</button>
  </div>

  <div class="header">
    <div class="badge">✦ AI-Powered</div>
    <h1>Review Responder</h1>
    <p class="subtitle">Turn customer reviews into polished replies — in seconds.</p>
  </div>

  <!-- Places Panel -->
  <div class="places-panel">
    <div class="places-header">
      <div class="places-title">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Find Business Reviews on Google
      </div>
      <button class="places-toggle" id="placesToggle" onclick="togglePlaces()">▾ Open</button>
    </div>

    <div class="places-body" id="placesBody">
      <div class="search-row">
        <input
          class="search-input"
          id="businessSearch"
          type="text"
          placeholder="Search your business name, e.g. Spice Garden Mumbai"
        />
        <button class="search-btn" id="searchBtn" onclick="searchBusiness()">🔍 Search</button>
      </div>

      <div id="placesStatus"></div>
      <div class="business-list" id="businessList"></div>
      <div class="reviews-section" id="reviewsSection" style="display:none;">
        <div class="reviews-heading">Reviews — click one to load it into the form ↓</div>
        <div class="reviews-list" id="reviewsList"></div>
      </div>
    </div>
  </div>

  <!-- Main Form -->
  <div class="card">
    <div class="row-2">
      <div>
        <label>Business Name</label>
        <input id="businessName" type="text" placeholder="e.g. Spice Garden" />
      </div>
      <div>
        <label>Business Type</label>
        <select id="businessType">
          <option>Restaurant</option>
          <option>Hotel</option>
          <option>Clinic / Hospital</option>
          <option>Salon / Spa</option>
          <option>Retail Shop</option>
          <option>Real Estate</option>
          <option>Other</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Review Rating</label>
      <div class="stars" id="starsContainer">
        <button class="star-btn" data-val="1">☆</button>
        <button class="star-btn" data-val="2">☆</button>
        <button class="star-btn" data-val="3">☆</button>
        <button class="star-btn" data-val="4">☆</button>
        <button class="star-btn" data-val="5">☆</button>
        <span class="star-label" id="starLabel"></span>
      </div>
    </div>
    <div class="field">
      <label>Customer Review</label>
      <textarea id="reviewText" rows="4" placeholder="Paste the customer's review here — or search Google reviews above."></textarea>
    </div>
    <div class="field">
      <label>Response Tone</label>
      <div class="tones">
        <button class="tone-btn active" data-tone="Professional">Professional</button>
        <button class="tone-btn" data-tone="Friendly & Warm">Friendly & Warm</button>
        <button class="tone-btn" data-tone="Apologetic">Apologetic</button>
        <button class="tone-btn" data-tone="Confident">Confident</button>
      </div>
    </div>
    <div class="error" id="errorBox"></div>
    <button class="generate-btn" id="generateBtn" onclick="generate()">
      ✦ Generate Response
    </button>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <span class="result-label">✦ Your Response</span>
      <button class="copy-btn" id="copyBtn" onclick="copyText()">Copy</button>
    </div>
    <p id="responseText"></p>
    <div class="result-footer">
      <button class="regen-btn" onclick="generate()">↻ Regenerate</button>
    </div>
  </div>

  <p class="footer">Powered by Claude AI</p>

  <script>
    let selectedStars = 0;
    let selectedTone  = "Professional";
    const starLabels  = ["", "Very Bad", "Poor", "Average", "Good", "Excellent"];
    let panelOpen     = false;

    // ── Load User ──────────────────────────────────────────────────────────────
    async function loadUser() {
      try {
        const res  = await fetch("/me");
        if (res.status === 401) { window.location.href = "/"; return; }
        const user = await res.json();
        document.getElementById("userName").textContent = user.name?.split(" ")[0] || user.email;
        document.getElementById("avatarFallback").textContent = (user.name || user.email || "?")[0].toUpperCase();
        if (user.picture) {
          const img = document.getElementById("avatarImg");
          img.src = user.picture; img.style.display = "block";
          document.getElementById("avatarFallback").style.display = "none";
          img.onerror = () => { img.style.display = "none"; document.getElementById("avatarFallback").style.display = "flex"; };
        }
        document.getElementById("userBar").style.display = "flex";
      } catch(e) {}
    }
    loadUser();

    // ── Stars ──────────────────────────────────────────────────────────────────
    document.querySelectorAll(".star-btn").forEach(btn => {
      btn.addEventListener("click", () => setStars(parseInt(btn.dataset.val)));
    });
    function setStars(n) {
      selectedStars = n;
      document.querySelectorAll(".star-btn").forEach((b, i) => {
        b.textContent = i < n ? "★" : "☆";
        b.style.color = i < n ? "#F59E0B" : "#9CA3AF";
      });
      document.getElementById("starLabel").textContent = starLabels[n];
    }

    // ── Tones ──────────────────────────────────────────────────────────────────
    document.querySelectorAll(".tone-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tone-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedTone = btn.dataset.tone;
      });
    });

    // ── Places Panel ──────────────────────────────────────────────────────────
    function togglePlaces() {
      panelOpen = !panelOpen;
      document.getElementById("placesBody").classList.toggle("open", panelOpen);
      document.getElementById("placesToggle").textContent = panelOpen ? "▴ Close" : "▾ Open";
      if (panelOpen) document.getElementById("businessSearch").focus();
    }

    function setStatus(msg, isError = false) {
      const el = document.getElementById("placesStatus");
      el.className = isError ? "places-error" : "places-status";
      el.textContent = msg;
    }

    // Search on Enter key
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("businessSearch").addEventListener("keypress", e => {
        if (e.key === "Enter") searchBusiness();
      });
    });
    document.getElementById("businessSearch").addEventListener("keypress", e => {
      if (e.key === "Enter") searchBusiness();
    });

    async function searchBusiness() {
      const query = document.getElementById("businessSearch").value.trim();
      if (!query) return;

      const btn = document.getElementById("searchBtn");
      btn.disabled = true; btn.textContent = "Searching...";
      setStatus("Searching Google for businesses...");
      document.getElementById("businessList").innerHTML = "";
      document.getElementById("reviewsSection").style.display = "none";
      document.getElementById("reviewsList").innerHTML = "";

      try {
        const res  = await fetch(`/places/search?query=${encodeURIComponent(query)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        if (!data.places.length) {
          setStatus("No businesses found. Try a more specific search.", true);
        } else {
          setStatus(`${data.places.length} business${data.places.length > 1 ? "es" : ""} found — select one to load its reviews:`);
          data.places.forEach(p => renderBusinessItem(p));
        }
      } catch(e) {
        setStatus("Search failed: " + e.message, true);
      }

      btn.disabled = false; btn.textContent = "🔍 Search";
    }

    function renderBusinessItem(place) {
      const item = document.createElement("div");
      item.className = "business-item";
      const stars = place.rating ? "★".repeat(Math.round(place.rating)) + `  ${place.rating}` : "";
      item.innerHTML = `
        <div class="business-name">${place.name}</div>
        <div class="business-meta">
          <span class="business-address">${place.address || ""}</span>
          ${stars ? `<span class="business-rating">${stars} (${place.totalRatings?.toLocaleString() || 0})</span>` : ""}
        </div>
      `;
      item.addEventListener("click", async () => {
        document.querySelectorAll(".business-item").forEach(el => el.classList.remove("selected"));
        item.classList.add("selected");
        document.getElementById("businessName").value = place.name;
        await loadReviews(place.placeId, place.name);
      });
      document.getElementById("businessList").appendChild(item);
    }

    async function loadReviews(placeId, businessName) {
      const section = document.getElementById("reviewsSection");
      const list    = document.getElementById("reviewsList");
      section.style.display = "none";
      list.innerHTML = "";
      setStatus("Loading reviews...");

      try {
        const res  = await fetch(`/places/reviews?placeId=${encodeURIComponent(placeId)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        if (!data.reviews || !data.reviews.length) {
          setStatus("No reviews found for this business.", true);
          return;
        }

        setStatus(`${data.reviews.length} review${data.reviews.length > 1 ? "s" : ""} loaded:`);
        data.reviews.forEach(r => renderReviewItem(r, businessName, list));
        section.style.display = "block";
      } catch(e) {
        setStatus("Could not load reviews: " + e.message, true);
      }
    }

    function renderReviewItem(review, businessName, container) {
      const n      = review.rating || 0;
      const starStr = "★".repeat(n) + "☆".repeat(5 - n);
      const item   = document.createElement("div");
      item.className = "review-item";
      item.innerHTML = `
        <div class="review-meta">
          <span class="review-author">${review.author || "Anonymous"}</span>
          <span class="review-stars">${starStr}</span>
        </div>
        <div class="review-time">${review.time || ""}</div>
        ${review.text
          ? `<div class="review-snippet">${review.text}</div>`
          : `<div class="review-no-text">No written review — rating only</div>`}
        <div class="click-hint">↓ Click to load into form</div>
      `;
      item.addEventListener("click", () => {
        document.querySelectorAll(".review-item").forEach(el => el.classList.remove("selected"));
        item.classList.add("selected");
        document.getElementById("businessName").value = businessName;
        document.getElementById("reviewText").value   = review.text || "(No written review — rating only)";
        setStars(n);
        document.querySelector(".card").scrollIntoView({ behavior: "smooth", block: "start" });
      });
      container.appendChild(item);
    }

    // ── Generate ──────────────────────────────────────────────────────────────
    async function generate() {
      const businessName = document.getElementById("businessName").value.trim();
      const businessType = document.getElementById("businessType").value;
      const review       = document.getElementById("reviewText").value.trim();
      const errorBox     = document.getElementById("errorBox");
      const btn          = document.getElementById("generateBtn");

      errorBox.style.display = "none";
      if (!businessName) { showError("Please enter your business name."); return; }
      if (!review)        { showError("Please paste a customer review."); return; }

      btn.disabled = true; btn.textContent = "⟳ Crafting your response...";

      try {
        const res = await fetch("/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ businessName, businessType, review, tone: selectedTone, stars: selectedStars })
        });
        if (res.status === 401) { window.location.href = "/"; return; }
        const data = await res.json();
        if (!res.ok) { showError(data.error || "Something went wrong."); }
        else {
          document.getElementById("responseText").textContent = data.response;
          document.getElementById("resultCard").style.display = "block";
          document.getElementById("resultCard").scrollIntoView({ behavior: "smooth", block: "nearest" });
        }
      } catch(e) { showError("Network error: " + e.message); }

      btn.disabled = false; btn.textContent = "✦ Generate Response";
    }

    function showError(msg) {
      const box = document.getElementById("errorBox");
      box.textContent = msg; box.style.display = "block";
    }

    function copyText() {
      navigator.clipboard.writeText(document.getElementById("responseText").textContent).then(() => {
        const btn = document.getElementById("copyBtn");
        btn.textContent = "✓ Copied!"; btn.classList.add("copied");
        setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("copied"); }, 2000);
      });
    }

    function logout() { window.location.href = "/auth/logout"; }
  </script>
</body>
</html>
